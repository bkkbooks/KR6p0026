body:
  text: 清浙水慈雲寺灌頂沙門續法録注鳳嶺報國寺映壁沙門嚴光校閲注此一經開為十門一教起所因有總有別總者如來唯為一大事因緣出現於世唯欲衆生開示悟入佛之知見今經直指衆生以念佛心入佛知見別者有十一激揚凡夫起欣厭故二誡勸二乘修淨土故三引進大乘成佛道故四普攝三輩盡得度故五勉䇿八難超入聖故六獨憫末法作津梁故七特出諸門一方便故八直指衆生但念佛故九轉明持名徑中徑故十巧示願行得往生故二藏乘分攝藏有二一三藏經律論也經藏所攝二二藏聲聞菩薩也菩薩藏攝乘亦二一三乘小中大也大乘所攝二四乘聲聞辟支菩薩佛也佛乘所攝分十二長行重頌授記孤起自說因緣譬喻本事本生方廣未有論議也長行自說二分所攝三時會前後先別時開三一日出先照時二日升轉照時復有三謂初轉中轉後轉時也三日沒還照時今此經者轉照時內第二中轉時也次通時開十一唯約一念時二盡該一化時三遍周三際時四攝同類劫時五收異類劫時六以念攝劫時七劫念重收時八異類界劫時九彼此攝入時十以本收末時今此經者前至華嚴普賢願王引歸樂土後至法華藥王本事接見彌陀餘九時中念佛法門熾然說無間歇也後明會有五一華嚴梵網會二提胃阿含會三深密方廣會四妙智般若會五法華涅槃會此當方廣會時說也四教義分齊教分二先化法教開五一小教二始教三終教四頓教五圓教今圓教攝一佛乘故諸佛讚故不可思議功德經故念一佛名普見佛故兼屬頓終是心是佛故一念速證故頓也是心作佛故終得成佛故終也次化儀教開十一本末差別門二依本起末門三攝末歸本門四本末無礙門五隨機不定門六顯密同時門七一時頓演門八寂寞無言門九該通三際門十重重無盡門此當第一差別門中本法所攝始終唯為一佛乘機說念佛法圓頓教故兼通後二三世塵方無盡說故義亦二一念佛有四一持名二觀像三觀想四實相清凉開五一稱名往生念佛門二觀像滅罪念佛門三攝境唯心念佛門四心境無礙念佛門五緣起圓通念佛門初二事法界觀實相唯心理法界觀觀想心境無礙理事無礙觀五緣起門事事無礙觀也今明持名亦開五門一執持名號念佛門心外有佛名相小教事法界觀二攝名歸心念佛門佛名唯心所現始教理法界觀三心名雙融念佛門即心即佛終教四心名俱泯念佛門非心非佛頓教理事無礙觀也五重重無盡念佛門一念心一佛名遍含法界緣起無盡圓教事事無礙觀也則此念佛一行三昧五教俱該徹四法界義理深廣蓋可知矣五所被階品先料揀具聞思修三慧備信願行三資糧者皆名機宜反是皆非根器又是器中三輩九品各各分之輩品無量次總收不論疑信毀讚但聞知彼佛名必生彼國並成佛道涅槃云一切衆生皆有佛性有佛性者皆當作佛大本云地獄鬼畜生亦生我剎中則愛憎順逆咸佛機緣也六教體淺深分四一隨相門又二一謂聲名句文二謂所詮義理文義皆屬相故二唯識門此文此義皆識所變三歸性門前以所變萬境攝歸能變八識今以所現八識復歸能現一性四無礙門心境理事本自交徹境事隨相心者唯識理者歸性互融攝故七宗趣通局通有六宗一隨相法執宗阿含經俱舍論小乘宗也二唯識法相宗深密經瑜伽論大乘相宗也三真空無相宗妙智經智度論大乘空宗也四藏心緣起宗勝鬘經寶性論大乘法性宗也五真性寂滅宗楞伽經真如論大乘無性宗也六法界圓融宗華嚴經十地論一乘法界宗也德雲念佛普見法界一切諸佛屬華嚴宗勢至以念佛心入無生忍屬無性宗法華聞藥王事往安樂剎屬法性宗應如法思之局明此經復分總別總以依正清淨信願往生得不退轉阿耨菩提以為宗趣別成五對一教義以教言為宗達義旨為趣二事理舉事相為宗顯理性為趣三境智緣境界為宗起觀智為趣四行位信願行為宗九品位為趣五因果滿因功為宗克果德為趣八部類差別部有二一大本二此經類有三一十六觀經二鼓音王經三後出阿彌陀偈經三非部非類如華嚴法華楞嚴楞伽十住斷結文殊般若帶說淨土等九總釋名題開二先經名佛說阿彌陀經略科四一能說佛二正明說三所說佛四結說名言此土釋迦佛說彼土彌陀佛依正莊嚴信願往生之經也詳釋者梵語佛陀此云覺者自覺覺他始本究竟故華嚴明十佛楞伽明四佛心地觀明三佛即本師釋迦牟尼佛也說者梵語鉢底婆此云辨說四辨宣演故又悅也暢悅本懷故說通五人一佛二菩薩三天四仙五化人今曰佛說揀餘四也梵語阿此云無梵語彌陀此云量謂佛功德不可思量故因中教義理事智境斷證行願位階因修果報體用逆順果上智願名相光明壽命眷屬國土神通說法應感利益皆無數量平等覺經翻為無量清淨稱讚淨土經云名無量壽及無量光且舉果位一二言也萬佛名經出十名阿彌陀佛阿彌幢佛阿彌陀聲佛阿彌稱佛阿彌陀吼佛阿彌積佛阿彌陀勝佛阿彌陀師子佛阿彌陀住持佛阿彌陀勝上佛大本出十二名無量光佛無邊光佛無礙光佛無對光佛炎王光佛清淨光佛歡喜光佛智慧光佛不斷光佛難思光佛無稱光佛超日月光佛十名斷十使十惡十苦十二名治十二時中六根六塵隨眠倒想無量淨體大也法身佛無始無終無量壽相大也報身佛有始無終無量光用大也化身佛有始有終初即自性身有大斷德二空所顯諸佛同等二即受用身有大智德真常無漏諸佛同意三即變化身有大恩德定通變現諸佛同事梵語欲底修多羅此云契經欲底契也左契彌陀佛理右契衆生根行中契釋尊六佛果懷修多羅經也佛地論二義一貫穿貫所說理二攝持攝所化生此方明四義一常古今不易也二法遠近同尊也三徑生佛徑路也四典聖賢典誥也對辨開合有四一教義對經能詮教也上五字所詮義也二境智對佛說智也彌陀境也三體用對阿者言無無生性體彌陀言量無量相用四人法佛人也說法也四門分配經教也阿彌陀理也說行也佛果也六離合釋佛之說依主釋佛說即阿彌陀持業釋佛說阿彌陀有經有財釋彌陀經非天親論相違釋娑婆釋迦佛說鄰安養彌陀佛鄰近釋一佛說阿彌陀佛依正二報帶數釋諸經得名單復不同維摩經單人也涅槃經單法也寶積經單喻也佛報恩經人法也金剛般若經法喻也佛頂首楞嚴經具足人法喻也此經以單人為題準六方佛應名稱讚不可思議功德一切諸佛所護念經今是什師改定然有二義一上八字即是稱讚彌陀功德利樂法故二下八字六方諸佛亦是護念念彌陀佛諸衆生故則一總題之中該羅無盡諸法門矣次譯人姚秦三藏法師鳩摩羅什奉詔譯姚秦標代揀非周之嬴秦南北朝之符秦也三藏顯德通經律論稱曰三藏弘範三界名為法師羅什出名具云鳩摩羅耆婆此云童壽童年有耆德故什者兼善華梵文字什故奉譯結成奉秦詔旨譯梵成華也秦主姚興迎師入關乃集沙門肇睿等八百餘人共翻經論三百九十餘卷臨終化後舌根儼然七佛以來譯經師也又唐三藏法師玄奘貞觀三年西域取經六百餘部貞觀十九年還京玉華臺內譯此經名稱讚淨土佛攝受經前後共翻經論一千三百二十卷終見白蓮佛相而逝面貌如生時所宗尚皆弘秦本詳如雲棲疏鈔十別解文義於中開二先解經文彌天釋道安三分判經一序分序列六種以證信也又二初五種證如是我聞一時佛在舍衛國祗樹給孤獨園如者真諦理是者俗諦事如所說者皆是真實指法之詞信成就也我者阿難自謂假名我也聞者親耳面聞非私淑於人聞成就也一時猶言當時彼一時等一者師資會遇說聽和合時成就也佛者指釋迦佛娑婆教主作人天師主成就也梵語舍衛此云豐德財寶塵境聖賢解脫四德豐足故匿王國名不離當處常住於中曰在祗樹者梵語祗陀此云戰勝謂祗陀太子所施樹林也獨園者梵語須達多此云給孤獨謂給孤長者所買園苑也君尊臣卑故先樹後園此是佛僧居室國令遠聞園令近知處成就也二三衆證三一聲聞衆二初標數歎德與大比丘僧千二百五十人俱皆是大阿羅漢衆所知識先標數也與共義相與也大者人天大供博學多聞超勝凡外故比丘三義乞士破惡怖魔也僧伽翻和合衆一事和無諍同行六法也謂身和同住口和同念意和同悅戒和同修見和同解利和同均二理和無違同證擇滅也千二百五十者三迦葉徒衆共一千目連舍利弟子各有一百耶舍長者主伴共五十人并陳如等五比丘應言千二百五十五人也俱俱在同聽者皆下次歎德也大者揀餘初心有學小果故阿羅漢果號對比丘因位名亦三義應供殺賊無生也聞名重德曰知覩形欽心曰識二列名例餘長老舍利弗摩訶目犍連摩訶迦葉摩訶迦旃延摩訶俱絺羅離婆多周利槃陀伽難陀阿難陀羅睺羅憍梵波提賓頭盧頗羅墮迦留陀夷摩訶劫賓那薄拘羅阿㝹樓䭾如是等諸大弟子先列名也長老德長臘老也貫下十六尊宿舍利翻鶖鷺弗翻子眼淨如鶖連母為名八歲登論師座七日遍通佛法智慧第一摩訶云大目犍連翻采菽氏名拘律陀樹名此云無節禱此樹神得生為名降龍制山止車燒堂神通第一摩訶迦葉翻大龜氏姓也族長稱大一云飲光名畢鉢羅亦樹名金佛然燈身感金光頭陀第一迦旃翻剪髮姓也延胤也彼種後胤耳摩訶大也一宗之長也有云大文飾亦云扇繩子繫母故答外三世輪回善惡因果論議第一摩訶俱絺羅此云大膝舍利弗舅讀十八經誓不剪爪答問第一離婆多翻室宿禱此星宿生故鬼為填臂悟得我空音義云此云所供養無倒亂第一周利槃陀伽此云繼道使誦掃百日成果調息第一難陀翻善歡喜放牛難陀也尊者住戒能制五根勿令放逸入於五欲如牧牛人執杖視之不令縱逸犯人苗稼從初慕道為名攝心第一阿難陀云慶喜釋尊成道日生中外欣慶亦云無染隨佛入天龍宮見諸美女寶物心無染著故多聞第一羅睺羅翻覆障宿塞鼠穴經六日夜今報生苦處胎六年密行第一憍梵波提此云牛呞宿輕沙門今報虗哨佛受馬麥彼食天饌受天供養第一賓頭盧云不動名也頗羅墮云利根姓也樹提長者栴檀鉢置剎竿神力取者即與尊者取之佛敕久住應供第一迦留陀夷此云黑光悉達未出家時師也照破生死昏惱黑夜破暗第一摩訶劫賓那此云黃髮金頭仙之苗裔亦云房宿父母禱此星生又與化佛寄宿陶房聞法得道毗沙門天持蓋隨後知星宿第一薄拘羅翻善容又重姓由昔持不殺戒施病僧果今感五不死報母置熬盤湯釜河水魚吞刀割一無所傷兩姓供膳年百六十壽命第一阿㝹樓䭾此云無貧又云如意過去饑世稷飯施辟支佛九十一劫受用無乏初出家時佛呵晝寢七日不眠失其雙目佛教修習樂見照明金剛三昧得天眼通觀界如掌天眼第一如下次例餘也如是結前等者該餘學在師後曰弟解從師生曰子常隨不一曰諸因多果勝曰大二菩薩衆并諸菩薩摩訶薩文殊師利法王子阿逸多菩薩乾陀訶提菩薩常精進菩薩與如是等諸大菩薩并下明類也菩薩翻覺有情上求菩提覺道下化薩埵有情也摩訶薩大菩薩也願行廣大智悲並運真俗融通權實無礙故文下列名也文殊師利此云妙德妙吉或云普首敬首諸佛之師也菩薩上首德推文殊名法王子大智第一阿逸多此云無能勝名也彌勒此云慈氏姓也昔遇大慈如來願同此號又於然燈佛所得成唯心識定發願於刀兵劫擁護衆生慈心第一乾陀訶提云不休息勇猛護法行諸梵行歷恆沙劫然後授記智增上者常精進寶積云化一衆生經劫不捨萬佛名經云捨手足與人入火坑求法悲增上者與下結例也數多億萬曰諸揀餘權小曰大三人天衆及釋提桓因等無量諸天大衆俱釋提桓因翻能天主迦葉佛時發心修塔三十二人佐之今生三十三天等者舉一忉利以該六欲天也無量通攝色空及餘百億三界天也大衆總收會內八部四衆人也又千二百常隨衆舍利弗當機衆文殊等影響衆釋提等結緣衆合名衆成就也二正宗分一經開為四分是念佛法門所宗之正義也四分云何一詳二報令信教分二示七期令修行分三引六佛令契理分四彰三難令證果分此倣清凉華嚴疏科如是分文釋義俾文字般若起諸觀照達乎實相也初詳二報令信教分又二先總告爾時佛告長老舍利弗從是西方過十萬億佛土有世界名曰極樂其土有佛號阿彌陀今現在說法初二句舉能說聽之人爾時者當彼淨土根機成熟時也佛能說主舍利弗能聞人告者悲願情深不俟請故稱長老者智德先人能信行故從是下明所說聽之法有二先依報法是指此界東土娑婆言西指西方彼界樂國言以定苦樂所當趨避也過十萬億有者華嚴云一念瞋心起百萬障門開表超十界十使十惡十苦即見唯心淨土自性彌陀矣世三世時也界十方處也極樂梵語須摩提亦云清泰安養證涅槃四德真常樂矣其下次正報法土通淨化劣勝受用自性法界五種佛亦如之故阿彌陀翻為無量彼土化法主也現揀過未二際法指念佛法門觀經云汝等心想佛時是心即是三十二相八十隨形好是心作佛是心是佛諸佛正遍知海從心想生是故應當一心繫念此實淨業之宗歸也果成菩提四智彌陀現說法矣次別說二初依報又二一極樂名稱舍利弗彼土何故名為極樂其國衆生無有衆苦但受諸樂故名極樂何故徵也其下釋也逼惱曰苦三五曰衆適悅曰樂七八曰諸彼國蓮花化生一生不退之樂則無分段變易二生死苦二樂二苦離欲清淨則無受身苦苦依正常然則無樂謝壞苦超過三界則無遷流行苦三樂三苦九品托化則無生居胎獄寒暑不遷則無老厭龍鍾身離分段則無病受疼痛壽命無量則無死悲分散觀陰本空則無五陰熾盛五樂五苦無眷屬纍則無親愛偏離善人同會則無冤憎偏遇所欲自至則無求願不得加前五成八樂八苦楞嚴十苦者即八苦後四種加盲聾瘖啞三途彼國相好莊嚴無惡道名則無十苦但受十樂也故名結也論云永離身心惱受樂常無間二莊嚴事相分四一欄網行樹又舍利弗極樂國土七重欄楯七重羅網七重行樹皆是四寶周匝圍繞是故彼國名為極樂先詳陳初重曰又橫曰欄直曰楯表七支身三口四戒也網如梵釋天網表七大乘性謂心法解淨資時果也樹錯花果如帝釋瓶表七菩提道如下也四寶表四如意足欲念進慧也此皆彌陀功德莊嚴者淨名云無漏法林樹覺意淨妙花解脫智為果華嚴云菩薩妙法樹生於直心地信種慈悲根智慧以為身方便為枝幹五度為繁密定葉神通花一切智為果是故句總結也二池閣蓮花二先別釋三一池水又舍利弗極樂國土有七寶池八功德水充滿其中池底純以金沙布地又二層也方為沼圓為池八德者輕軟澄淨清冷甘美安和潤澤除饑長養也池表七自性性相因緣集成種也七寶表七聖財如下八德表八解脫定也金沙恆沙性德地心地也維摩云八解之浴池定水湛然滿布以七淨花浴此無垢人二階閣四邊階道金銀琉璃玻瓈合成上有樓閣亦以金銀琉璃玻瓈𤥭璖赤珠瑪瑙而嚴飾之離地曰階坦途曰道重屋曰樓岑樓曰閣四階表四念處身受心法四攝法布施愛語利行同事樓閣表三三昧空無相無作三種禪世間禪出世間禪上上禪金戒也銀信也琉璃聞也玻瓈慚也𤥭璖進也赤珠慧也瑪瑙捨也三蓮花池中蓮華大如車輪青色青光黃色黃光赤色赤光白色白光微妙香潔大如輪者婆沙云金輪大十五里大本云或一由旬乃至百千由旬梵語優鉢羅此云青蓮花拘勿頭此云黃蓮花鉢特摩此云紅蓮花芬陀利此云白蓮花葉瓣八萬細畫曰微花果同時出現曰妙鬚臺芬馥噴口曰香根莖入出不染曰潔蓮表菩提心中佛之知見大表三乘中一大佛乘色境也光智也四表教行果理四門微等四德開示悟入也次總結舍利弗極樂國土成就如是功德莊嚴化道於人曰功踐實於己曰德因圓曰成果滿曰就充內曰莊形外曰嚴如是指池階華閣總謂彌陀因中願行衆功莊就果上定慧萬德嚴成者也彌陀願云我作佛時剎中地上至於虗空皆有宮殿樓閣池流華樹悉以衆寶百千香成生我剎者皆於七寶水池蓮華化生又云法藏攝取二十一億佛剎淨行修持如是積功纍德無量億劫方得圓成而入佛位華嚴云普賢智地行悉成一切莊嚴從此出此約修言若依性說大行大願皆佛自性無漏功德也起信論云如來藏中具足恆河沙性功德維摩云隨其心淨則佛土淨又全修在性就如德莊全性起修成是功嚴性修不二成就如是功德莊嚴也華嚴云一切寶鈴網解一切法如幻心所生一切寶樓閣無著善根無生善根所生又云華藏海中山河樹林一一皆稱真如法界具無邊德頌曰華藏世界海法界等無別莊嚴極清淨下例此知之三天樂雨花二初別舉又舍利弗彼佛國土常作天樂黃金為地晝夜六時雨天曼陀羅華其土衆生常以清旦各以衣裓盛衆妙華供養他方十萬億佛即以食時還到本國飯食經行義相有五一天樂三番曰又不歇曰常樂表無生法也二金地表金剛般若心地三雨華法華明四種一曼陀羅此云適意亦云白花二摩訶曼陀羅此云大白花三曼殊沙此云柔軟亦云赤花四摩訶曼殊沙此云大赤花晝表轉煩惱成菩提夜表轉生死成涅槃晝六時表六根照破六塵除六煩惱夜六時表六識不起六想斷六疑垢也雨潤澤也天法性也四花表住行向地四位因也四盛供衆生降佛以還聖凡人也清旦晝六時之一襟裾曰裓為盛花之器具妙華有三一天花二陸花草木區別三水花清旦表本覺衣裓表無生法忍衆花表三行謂上求菩提中修六度下化衆生也供佛以因嚴果也他方內兼白佛表不唯自覺兼覺他也五飯食食時早晨也表始覺中名字覺晌午相似覺日昃隨分覺旰晚圓覺也本國本真自性域也即還表三意身六神通也阿含經四分律明出世五食一願二念三禪悅四法喜五解脫論云愛樂佛法味禪三昧為食維摩云甘露法之食解脫味為漿行表三利行也又食表定自覺境也行表慧覺他觀也二總結舍利弗極樂國土成就如是功德莊嚴彌陀願云人天聞我名者然燈散花菩薩以香花等供諸他方佛者食頃遍至欲飲食時寶鉢之中百味現前食已自去又云或為比丘輪王恆往佛所供養手中常出衣食幡蓋及音樂等則知樂花衣食自然皆是彌陀願行力所致也四化禽風樹二先列明二一化禽演法三初正示復次舍利弗彼國常有種種奇妙雜色之鳥白鶴孔鸚鵡舍利迦陵頻伽共命之鳥是諸衆鳥晝夜六時出和雅音其音演暢五根五力七菩提分八聖道分如是等法四復曰復次後曰次種種鳥者八萬恆沙波羅蜜法也白鶴戒度潔白無染孔施度屏喜人鸚鵡忍度為他畜養舍利鶖鷺也進度扶老舂鋤迦陵頻伽此云仙音亦云妙音禪度未出殼時音聲超衆鳥故梵語耆婆耆婆迦此云共命亦云命命又云生生一身二首慧度得智慧命權實無障礙故晝三時者顯開三因佛性淨三業也夜三時者默住三德祕藏滅三障也圓教謂之和頓教謂之雅敷揚曰演開豁曰暢能生聖道曰根增長成立曰力五者總一信進念定慧也七分即七覺支擇進喜除捨定念也八聖即八正道見思語業命進念定也等者指念處正勤如意足三十七品助道及戒定慧正道乃至諦緣度法次顯益其土衆生聞是音已皆悉念佛念法念僧音正助道法佛有三身四智法有教行理果僧有賢聖果向念佛斷惑證真恩菩提益也念法超生出死恩涅槃益也念僧離苦得樂恩解脫益也後通妨舍利弗汝勿謂此鳥實是罪報所生所以者何彼佛國土無三惡道舍利弗其佛國土尚無惡道之名何況有實是諸衆鳥皆是阿彌陀佛欲令法音宣流變化所作先釋疑難疑云淨土何因有畜生耶故此通云汝意勿可謂也罪報生者愚癡墮畜生慳貪墮餓鬼瞋殺墮地獄又上品十惡五逆感地獄報中品惡逆感餓鬼報下品惡逆感畜生報法藏偈云地獄鬼畜生皆生我剎中一切來生者修習清淨行如佛金色身妙相悉圓滿則知女人生西方者具丈夫相三途生極樂者得佛果報所下次出所以有二一惡道實無法藏願云我佛剎中無鬼畜生以至蜎蠕又云剎中人皆不聞惡名況有其實故無三惡道及不善名也是諸下二佛力化作然有二意一如來神力化鳥說法二因中性相交修果上色心融化觀經云如意珠王湧出金色微妙光明化為百寶色鳥和鳴哀雅讚佛法僧二風樹演法舍利弗彼佛國土微風吹動諸寶行樹及寶羅網出微妙音譬如百千種樂同時俱作聞是音者自然皆生念佛念法念僧之心先出法音二初法也微者微凉清明醇和薰暢也開有八一利養二無衰三不毀四美譽五稱揚六無譏七離苦八快樂又魏譯八風相者謂徐微調和不寒不暑溫凉柔軟不遲不疾也觀經云八種清風妙音不思議教行理果法也風表空相性宗三乘一乘道也樹即七菩提網即七大性音即八音四辨也譬下二喻也百千人天音律表十法界中教義理事境智行位因果人法依正體用逆順感應十對法也同作具十玄門也聞下二顯聞益佛如醫王法如良藥僧如瞻視三念心者始覺心開事法界性得顯念佛益也本覺心開理法界性得顯念法益也始本合一圓妙覺心事理無礙法界性顯念僧益也又云見此樹者得三法忍永斷無明證法身理名無生忍得佛益也聞聖教法照明本性名音響忍得法益也折伏煩惱隨順真如名柔順忍得僧益也聞見饒益既爾覺知利樂可知次結成舍利弗其佛國土成就如是功德莊嚴如是指禽聲樹音法藏願云我作佛時國中華樹無量雜寶百千種香而共合成其香普熏十方世界衆生聞者皆修佛行又云佛道場樹衆寶莊嚴寶網覆上微風徐動出無量妙法音聲遍諸佛剎衆生聞者得深法忍住不退轉以至成就無上菩提二正報二一教主二先徵名舍利弗於汝意云何彼佛何故號阿彌陀徵有二意一前略出名未詳義相二依義既廣正相例然故問云何次顯德二一名含二義二初無量光舍利弗彼佛光明無量照十方國無所障礙是故號為阿彌陀多光者慧足也謂智光身光常光放光其因有二一萬德所成二本願所致又光明一道真實智也照國無量方便智也無障權實無礙智也而云十方者三乘七趣也準華嚴十智謂知諸佛佛法衆生世法三世法界無量無邊一切世界充滿住持普照智也二無量壽又舍利弗彼佛壽命及其人民無量無邊阿僧祇劫故名阿彌陀多壽者定足也初重曰又文句似倒應云彼佛及其人民壽命又云民者佛法王故阿僧祇翻無數佛壽有三法身真如理體為命故無量報身智慧德相為命故無邊化身慈悲應用為命故無數又應化身應十地聖人壽命則無量大化地前三賢以及二乘壽命則無邊小化人天壽命則無數心地觀云機緣無盡應化不斷相續常住則三佛壽皆無邊量數也因亦有二一本願力就二功德力成人民壽者亦有二因一佛本願力二自功德力一持佛名滅八十億劫生死重罪故無數觀像滅罪無限故無邊觀相好光滅罪無等故無量又因直心上求故無量深心中修故無邊悲心下化故無數又稱性修三心三福自感無邊量數壽也二道成十劫舍利弗阿彌陀佛成佛以來於今十劫疑曰壽既無量成佛至今經幾劫耶故此釋云過始十劫今後住世還有無量無數劫也梵語劫波此云時分大劫中之大劫也華嚴萬佛名經皆云娑婆世界一劫為極樂世界一晝夜則彼十劫超此無數劫矣而云十者十法界惑業苦也二化伴二初現在三乘二先釋又舍利弗彼佛有無量無邊聲聞弟子皆阿羅漢非是算數之所能知又二層也聲聞聞四諦聲得證果者弟子兼通支佛以及初心有學羅漢別指四果無學二乘衆也菩薩大乘權實教中三賢十地衆也皆無邊量非算數者佛昔歷劫塵方修諦緣度廣化無盡故次結舍利弗彼佛國土成就如是功德莊嚴論云二乘種不生者一約因地相宗謂二乘不信有他方佛色二據直進三明實行經云聲聞無量者一約果位觀經中品上生云聞四諦得羅漢中生云七日得初果半劫成四果下生云一小劫成羅漢二據回心三明權化海東引偈云七種淨華衆正覺華化生是也而云功德嚴者先約因地言大本云法藏發願已阿僧祗劫護身口意修行六度了空無相無作以行教化致無量衆生發菩提心次約果位說觀經云水注華間尋樹上下演說苦空無常無我諸波羅蜜復有讚歎諸佛相好者大本云微瀾洄流波揚妙聲或聞佛法僧聲或寂靜聲空無我聲大慈悲聲波羅蜜聲十力無畏不共法聲又云既皆浴已有在地思道者經行者有在空講經者坐禪者未得四果者因得四果未得不退菩薩地者因得不退轉地故其人民壽命三乘無量並是彌陀功德成也二往生賢聖又舍利弗極樂國土衆生生者皆是阿跋致其中多有一生補處其數甚多非是算數所能知之但可以無量無邊阿僧祗說先不退三番曰又衆生十方願生者阿跋致此云不退轉地彌勒問經說一大乘菩提道心自不退二已得功德行位則不退三未得賢聖覺果亦不退此該因果以說賢首起信論疏明三一信行處無退緣名不退二初住入正定聚名不退三初地證滿法身名不退此通五位以說今經並非前二義相局十地論初至六地位不退也七地行不退也八之十地念不退也所以者何前諸菩薩已攝地前諸位後一補處單約等覺一位故也不退因緣有五一悲願力持二佛光常照三樹林說法四菩薩為友五壽命永劫論云人天不動衆清淨智海生不動不退地也智海妙覺海也次補處一生者等覺菩薩較佛果地猶有一生隔故斷此一分生死破此一品無明如望夜月光極淨滿即補佛位圓妙覺果也法藏願云我作佛時剎中菩薩神通智慧辨才相好皆悉如佛後顯數大本明此界中七百二十億菩薩他方十四佛剎以及無量佛國菩薩往生由佛往昔三心四願乃能致此二示七期令修行分四一發願舍利弗衆生聞者應當發願願生彼國所以者何得與如是諸上善人俱會一處先勸發願衆生淨土機也聞慧中含信資願資中含思慧下善德含修慧行資也離此三慧三資則非淨土機矣所下次出所以諸人指上三乘賢聖言益者有四一常聞法二行不退三無魔障四易入道他土反是應願樂國也二起行二先方便行舍利弗不可以少善根福德因緣得生彼國善十善根五根福前五度利他行也德般若度自利願也內自親生為因了得是心是佛發菩提心正因性顯也外來助起為緣了得是心作佛持佛名號緣因性顯也不可者勸誡也少者積纍也並明因得生果也次正修行舍利弗若有善男子善女人聞說阿彌陀佛執持名號若一日若二日若三日若四日若五日若六日若七日一心不亂文四義先舉人根男女稱善者涅槃明佛性有二一理佛性二行佛性則佛性善本具者修行善通今昔也次出法門拳拳服膺曰執約身業念念勿失曰持約口業又聞聞慧執思慧持修慧法有四一出聲明持二密念默持三半明半默微動唇舌而念呪家名金剛持四非明非默住佛心中朗朗不昧前三事持憶念不斷也後一理持觀照一如也此於四五念佛門中的指持名一行三昧三定期限大本聲王十日大集七七般舟九十為鈍根太多也大本一日觀經十念法華一稱為利根太少也今經七日處中道也表斷七使惱以正七識信論梨耶業轉現智相續意識治七支惡以攝七情超七趣苦以滅七難譬彼初果斷七生地藏七七判定帝王齊七政易經七日一復乃至七日胎七步蛇法爾然也四成功行一心該因行不亂徹功果淨念相繼事一心也心境不二理一心也專注無妄事不亂也如契合理不亂也亦可一心理念佛也是心是佛故成一行真如三昧定也不亂事念佛也是心作佛故成持名念佛法門慧也合則定慧均等事理無礙也若凖相宗三支量云念佛是有法一心不亂宗因云七日專持故同喻如螟蛉七日呪成三感果其人臨命終時阿彌陀佛與諸聖衆現在其前是人終時心不顛倒即得往生阿彌陀佛極樂國土先佛來我所其人平日持名人也臨終佛現者勢至云憶佛念佛現前當來必定見佛現則夢內定中當則空心臺上華嚴云一切諸根悉皆散壞唯此願王引導其前有因有果也所以三聖者一三聖悲願二行人三心三行三福如觀經所感次我往佛處心不倒者因既持名一心不亂果得念佛一行三昧圭山云生若妄想散亂臨終那得定心三力配之此即自己念力本有佛性力聖衆即佛攝取力本有如舟念如帆楫佛如順水順風出生死海到岸必矣即往生者人有善願佛必從之憶想外境念佛則生淨化佛土攝境歸心念佛則生劣報佛土心境互融念佛則生勝報佛土心境雙絶念佛即生法性佛土圓通無盡念佛即生法界佛土華嚴云以佛為境界專念而不息此人得見佛其數與心等則三輩九品感應不忒者也四結益舍利弗我見是利故說此言若有衆生聞是說者應當發願生彼國土利者命終佛接得生益也言者七日一心持名語也見則親身所覩說則親口所宣聞願者上聞依正功德莊嚴之說令起願樂此聞持名佛接往生之說而勸願也聞攝思修願該信行具斯六門始成淨業故再勸發詳明法利因果各十因十益者謂一名萬德六時易修七日得成一生了辦衆罪銷滅諸魔遠離增長善根橫截生死佛性開顯願光攝受也果十益者謂三聖來迎九品生去蓮胎托化永得不退國土淨嚴聖賢伴侶樹林說法壽命無量親蒙佛記神力度生也三引六佛令契理分二一明佛同讚二先本佛讚舍利弗如我今者讚歎阿彌陀佛不可思議功德之利我者揀餘聖賢今者揀異過未讚歎揀非誡勸不思揀有邊量功德揀事相福利者揀世間益稱美曰讚感譽曰歎覺他曰功自覺曰德開有十二德利謂依正名身光壽主伴願行因果也如上經說次他佛讚六一東方三先列名顯廣東方亦有阿閦佛須彌相佛大須彌佛須彌光佛妙音佛如是等恆河沙數諸佛東動也東為萌動之首萬物皆生長焉春歲甲乙木角仁元震之始生者不唯中央釋尊一讚曰亦阿閦此云不動法身不動故又冥真體於萬化域故如如身佛也須彌此云妙高四寶所成曰妙逈出十山曰高涅槃四德高超十界故名曰相功德身佛也相好光明莫不超勝稱之為大應化身佛也因轉八識果成四智立名曰光智慧身佛也一音說法隨類得解稱為妙音上四約身此約口業如是結指也等數例餘也因證恆沙性德故感沙數諸佛次現相表真各於其國出廣長舌相遍覆三千大千世界橫該十方曰廣竪徹三際曰長遍三千者楞嚴凡夫衆生舌根尚具一千二百功德華嚴十行菩薩成就十無盡藏其說法時以廣長舌出妙音聲充滿十方一切世界況果位佛耶證小則覆面門髮際證大則覆大千世界如法華出廣長舌上至梵世滿百千歲還攝舌相表以離世間十種舌超三乘七趣性相因果宣揚世出世間上上法也後發言勸信說誠實言汝等衆生當信是稱讚不可思議功德一切諸佛所護念經誠即不誑不異實即真實如語衆生東方諸國九界聽經衆也諦聽不疑曰信稱讚謂釋尊內褒外揚功德謂彌陀功勳德業護念謂諸佛身護心念一切有三意一局指東方二通兼六方三廣盡十方三世也問明頌云十方諸如來同共一法身一心一智慧力無畏亦然此心此理既同故佛佛自讚也經者作衆生經界之路為釋尊經理之本乃彌陀經常之法是諸佛經綸之道維摩稱小不思議淨名解脫止菩薩故華嚴稱大不思議遮那解脫妙覺佛故今經亦爾同佛果故念佛衆生見佛心故即凡成佛信該果海如是圓頓大教豈可思議也耶二南方三一列名顯廣舍利弗南方世界有日月燈佛名聞光佛大𦦨肩佛須彌燈佛無量精進佛如是等恆河沙數諸佛南明也南是麗明之所聖人嚮明而治天下也夏熒丙丁火徵禮亨離之次住者日月燈者日照晝破見思暗一切智也月照夜清塵沙惑道種智也燈照日月之所不及通乎晝夜破諸無明一切種智也名聞光者大智慧光明遍照法界故得名稱遠聞上佛自覺智此佛覺他智也大𦦨肩者權智照事實智照理荷擔一切佛法兩肩發𦦨也須彌燈者開則四法界智燈燈無盡合則一真無障礙法界智一道燈光輝天鑑地也無量精進者三心四願六度萬行咸常精進不懈息也如是下上列名此顯廣也二現相表真各於其國出廣長舌相遍覆三千大千世界三發言勸信說誠實言汝等衆生當信是稱讚不可思議功德一切諸佛所護念經佛告衆生有二說一轉引二同時衆生亦指南方本國四衆所護一切念佛人也餘例前下準知三西方三一列名顯廣舍利弗西方世界有無量壽佛無量相佛無量幢佛大光佛大明佛寶相佛淨光佛如是等恆河沙數諸佛西遷也西乃改變之先萬物皆遷落焉秋白庚辛金商義利兌之漸異者無量壽同本佛名如釋尊師古釋迦觀音師古觀音燈明同名有二萬普明同名有五百雲自在燈王同名有二千億詳在萬佛名經幢者建大法幢降伏魔外也壽約法身體大相約報身相大幢約化身用大大光放大悲光也說苦盡無畏大明大智慧光明也一切智無畏寶相因行嚴成寶光身相也漏盡無畏淨光真常清淨大願光也說障道無畏二現相表真各於其國出廣長舌相遍覆三千大千世界三發言勸信說誠實言汝等衆生當信是稱讚不可思議功德一切諸佛所護念經四北方三一列名顯廣舍利弗北方世界有𦦨肩佛最勝音佛難沮佛日生佛網明佛如是等恆河沙數諸佛北伏也北實收伏之處愚民背暗而歸伏明君也冬辰壬癸水羽智貞坎之終滅者𦦨肩者左慈同諸佛右悲合衆生也勝音者上弘一乘超出三界聖道也難沮者下度八難不為四惡沮溺也日生者日出三照破三障黑令生捨也網明者身住𦦨網開七趣暗令生喜也二現相表真各於其國出廣長舌相遍覆三千大千世界三發言勸信說誠實言汝等衆生當信是稱讚不可思議功德一切諸佛所護念經五下方三初列名顯廣舍利弗下方世界有師子佛名聞佛名光佛達磨佛法幢佛持法佛如是等恆河沙數諸佛下降而卑也下為低隱之地萬物皆當謙讓而知止焉屆乎秋冬巳土鎮宮乾信中之下底乾艮之退後者師子者降伏四魔離五怖故名聞者名稱遠聞十方諸佛也名光者名德光揚九界衆生也達磨此云法軌持義兼二利也法幢者軌生物解義利他也持法者持自法性義自利也達即中道諦無障礙法界幢即俗諦有為事法界持即真諦無為理法界二現相表真各於其國出廣長舌相遍覆三千大千世界三發言勸信說誠實言汝等衆生當信是稱讚不可思議功德一切諸佛所護念經六上方三一列名顯廣舍利弗上方世界有梵音佛宿王佛香上佛香光佛大焰肩佛雜色寶華嚴身佛娑羅樹王佛寶華德佛見一切義佛如須彌山佛如是等恆河沙數諸佛上升而尊也上是高顯之天萬物皆當崇重而行道焉間乎春夏戊土鎮宮乾信中之上頂巽坤之進前者梵音者聲有八轉謂體業具為從屬於呼各具八德謂調和柔軟諦了易解無錯無雌廣大深遠共成六十四種梵音深妙令人樂聞也宿王者月為星宿中王北辰為衆星拱佛在同異類中功德莫不尊勝故香上定香福足也香光慧香智足也𦦨肩先覺後覺也雜華嚴身者萬行因華嚴佛果身也即方便菩提娑羅此云堅固亦云最勝涅槃三德獨為尊故即真性菩提寶華德者無量知見智慧德相如珍寶花即實智菩提見一切義者一切法中實相之義無不知見究竟也即證勝義諦智德與衆生同得菩提也如須彌山者佛身長大高出十界如須彌之山王也即了世俗諦斷德與衆生同斷無明也二現相表真各於其國出廣長舌相遍覆三千大千世界三發言勸信說誠實言汝等衆生當信是稱讚不可思議功德一切諸佛所護念經所以六方交讚者法藏願云我作佛時名聞十方無數界佛各於衆中稱我功德及國土等二釋經顯益二一徵名舍利弗於汝意云何何故名為一切諸佛所護念經不問不思議者本佛讚中已釋通故單指彌陀依正功德利故獨問佛護念者前不說故通明諸佛功德及衆生法益故二釋益二先三慧益舍利弗若有善男子善女人聞是經受持者及聞諸佛名者是諸善男子善女人皆為一切諸佛之所護念皆得不退轉於阿耨多羅三藐三菩提先牒能聞經名善男女前後較之前佛性善屬昔理正因是一佛名淺少善根乃初心者此兼今行了緣并六佛經深多福德乃後心者經詮依正願行名謂六方佛號聞即聞慧受即思慧持即修慧是諸下次顯所獲法益護念者起信論六緣一差別緣護也二平等緣念也前緣又二一近緣念也速度脫故二遠緣護也久後度故近遠緣復有二一增長行緣護也二受以道緣念也阿耨多羅三藐三菩提者此云無上正等正覺究竟佛果也菩提翻三途不覺人天乘也三翻三界凡夫不正聲聞辟支二乘聖也連前從有入空觀真諦破見思一切智也藐翻小乘自利不等大乘始分教人三翻權教三乘度他未妙大乘終實教人合二從空出假觀俗諦破塵沙道種智也耨多羅翻漸教性未至上一乘頓教人也阿翻偏教法界心性未極無上一乘圓教佛也兼上空有圓融觀中道第一義諦破無明一切種智也不退轉者法藏願云聞我名已菩提有退轉者不取正覺況聞諸佛名受持是經乎望前阿跋致前屬已生去後此屬現在未生又通明經名各有三慧六因益也各有顯護密念不退正覺八果益也次三資益二初顯益三一信受益是故舍利弗汝等皆當信受我語及諸佛所說是故者結前躡上聞經聞名各得護念正覺益也皆當者起後無疑曰信領納曰受決宜曰當又攝已今意我語指我佛所說一彌陀經諸佛指六佛讚勸護念得果信例聞願益可知矣獲益深厚再三為勸二願樂益舍利弗若有人已發願今發願當發願欲生阿彌陀佛國者是諸人等皆得不退轉於阿耨多羅三藐三菩提先願生期望希求曰願好樂渴慕曰欲已今當者過現未三際時也表三發心開三因成三覺佛又信行願應時時發不可須臾離也是諸下次得果不退菩提對上揀之上乃教道初之七地此則證道八之十地也三行成益於彼國土若已生若今生若當生願後行滿無一不生者果徹因該云已今當表斷三障道而生三佛土法報化苦惑業如次配知以事證釋已願生如迦葉佛普賢文殊德雲比丘解脫長者今願生如藥師佛此界他方十四佛剎菩薩舍利阿難比丘韋提希夫人當願生如彌勒佛龍樹馬鳴菩薩北竺祈婆伽比丘滅後人天詳諸經論統上結之我語諸說各三資糧六因益各有不退成覺見佛往生八果益也細思之次結勸是故舍利弗諸善男子善女人若有信者應當發願生彼國土是故二字結上信佛發願得果生方益也諸善男等起下勸誡信願行也與上少異上則信佛說願生方現得菩提行念佛當得往生此則信彌陀當見佛願往生當生方行持名當成佛又上引說言教以勸此屬全體親證為勸又總前結顯之初聞依正功德以勸願二聞持名佛現以勸願三聞經名佛護不退以勸信四聞信教成覺得生以勸願勸勸倍切願願轉深則知信願行真因也生佛國實果也位非三不退已一生補處矣望前男女前雖十勝加今十二因十六果後後豈不勝前前哉稱曰諸善有何譽焉四彰三難令證果分諸佛三難者一出廣長舌二說誠實言三勸衆生信內又三難一釋尊稱讚二彌陀功德三諸佛護念釋尊三難者一行難行事二得難得果三說難信法內亦三難一彌陀勝德二六佛讚護三稱名成佛於中三初己讚諸佛舍利弗如我今者稱讚諸佛不可思議功德稱有三引證六方勸信一讚也顯聞諸佛不退二讚也勸衆信六佛說三讚也六佛德不思者總則互揚西方淨土念佛法門別開有十謂同聲一國同出一舌同一廣長同一遍覆同一實言同告一衆同一勸信同一共讚同一名德同一護念也二諸佛讚己二先標舉彼諸佛等亦稱讚我不可思議功德諸佛六方佛也等者四維三世佛也稱亦三告衆釋佛說經一讚也勸衆信聞是經二讚也護念是持經人三讚也我佛德不思者總則讚歎樂土嚴淨持名念佛法益別開亦十謂行難事住娑婆出五濁得菩提為衆生說經法教念佛示持名讚六方勸信聞也次詳陳而作是言釋迦牟尼佛能為甚難希有之事能於娑婆國土五濁惡世劫濁見濁煩惱濁衆生濁命濁中得阿耨多羅三藐三菩提為諸衆生說是一切世間難信之法初句能讚六佛作讚言也釋下所讚二先舉難得之人釋迦此云能仁大悲利物姓也牟尼此云寂默大智冥理名也次讚難能之事力任曰能作辦曰為自覺曰希有覺他曰甚難功德曰事業第一行事難也娑婆此云堪忍土之苦者五濁世之惡者五事穢染名為五濁惡業招感名為惡世揀彼安養樂土五清善世也梵語劫波此云時分減至二萬歲四濁凑集名劫濁也覺明心中空見不分所致色離四纏劫濁清矣因五利使諸見熾然名見濁也心中根大妄成所致受空我法見濁清矣緣五鈍使障礙塵沙名煩惱濁心中性相相織所致想脫塵勞煩惱濁清見慢陰報惡名穢稱名衆生濁心中遷留不住所致行無生滅衆生濁清色心連持催年促壽名命濁也心中同異失凖所致識亡一六命濁清矣能五濁世得三菩提不亦難乎對前二屬因修分證此屬果位究竟自覺斯為第二得道難也衆生三乘七趣也如孩愚濁世障惱如灰土投水則渾一切情器覺三世間也難信念佛法也如水清珠佛如鄉老約長能衆生中說難信法覺他功德不可思議第三說法難也前一為總後二為別亦略說耳廣開為六一行希有事二隨衆忍苦三誓入濁惡四自立成果五普為化度六說難信法三總結難事舍利弗當知我於五濁惡世行此難事得阿耨多羅三藐三菩提為一切世間說此難信之法是為甚難此躡諸佛讚語以證實也然亦少別上諸佛讚單約果位功業此釋尊述兼通因位願行一行難行事因則深心中修度行果屬自覺二得難得果因則直心上契佛理果屬滿覺三說難信法因則悲心下化生機果屬覺他略則三廣亦六一出五濁難二行奇事難三成妙覺難四度一切難五說念佛難六揀稱名難人信念佛法門固為難矣而信持名一行三昧得能往生見佛成果誠為難中甚難者也宜依教修證三流通分流傳弘通此經普度衆生盡於未來際也佛說此經已舍利弗及諸比丘一切世間天人阿修羅等聞佛所說歡喜信受作禮而去初句結經圓舍下舉聽衆舍利弗指當機諸比丘攝常隨三乘四衆咸該於內天人修羅三善道也等含八部七難聞下顯奉行聞聞慧歡思慧受修慧佛則能說人清淨說則所轉法清淨歡後衆得果清淨信即信資糧受即願資糧作即行資糧三資糧備去生淨土決矣說教也喜理也信行也禮果也四法門具必以斯道覺斯民也次釋呪語呪即密經經即顯呪誦經生慧持呪生福福慧兩足成佛定智身矣中分四先呪名拔一切業障根本得生淨土陀羅尼此即往生呪之別名拔消滅除淨也業障舉一業以攝惑報二也根本舉本以攝枝末也不思議神力傳云日夜各持三七遍滅五逆謗法等罪此約斷障門得生者謂生極樂得見彌陀也約證果門陀羅尼此云遮持謂遮惡不起持善生長也即拔障義亦云總持謂總一切法持無量義也即得生義彼蒲盧等異質尚能七日呪成況今佛呪衆生身中佛心七日豈不成佛果乎次譯人宋元嘉天竺三藏求那跋陀羅譯宋江南劉宋也南北朝代名元嘉文帝年號天竺西域國名三藏者博通三藏尤善大乘故求那跋陀羅此云功德賢尊者名也譯者易也謂翻梵語為華音也神異講辨詳餘傳集三呪語南無阿彌多婆夜一哆他伽多夜二哆地夜他三阿彌利都婆毗四阿彌利哆悉耽婆毗五阿彌唎哆毗迦蘭帝六阿彌唎哆毗迦蘭多七伽彌膩八伽伽那九枳多迦利十娑婆訶十一南無此云歸命亦云歸依阿彌多婆夜此云無量極樂教主名哆他伽多夜此云如來乘如實道來度衆生也十號之一哆地夜他此云即說呪曰或云所謂次下皆呪從古不翻如薄伽梵般若菩提準諸密部亦可義釋阿彌利都無量也婆毗或鉢囉光明也合云無量光智慧身佛也阿彌利哆同上無量悉耽或悉達一切義利成也婆毗同上光明合云無量義利成就光功德身佛也阿彌唎哆同無量毗迦蘭或毗訶隸翻無礙行又毗佛略翻普方廣帝者羯帝此云度去又戌提云清淨又盧吉低云世間合云無量廣大壽度去清淨世間應化身佛也阿彌唎哆毗迦蘭同上可知多者哆他真如不退動也又䭾摩法性不改轉也合云無量廣大壽真如法性不動不轉如如身佛也伽彌膩即須摩提此云極樂安養清泰妙意也伽伽那或誐誐曩此云虗空西方虗空天也合云極樂天界上四佛名正報也此一土名依報也枳多具云宿婆耻帝此云諦往迦隸或迦邏此云作者又伽車提此云願去合上我所作願欲去行之決定往生也此約信願行三資糧說娑婆訶速疾圓成也廣究密藏自知此釋四法益若有善男子善女人能誦此呪者阿彌陀佛常住其頂日夜擁護無令怨家而得其便現世常得安隱臨命終時任運往生若下勸人持誦阿下詳明呪益開五一佛住頂門二六時護身三怨害遠離四現世安樂五臨終生方傳云誦三十萬遍即見阿彌陀佛是知持名持呪無不見佛成佛也若不誦念孤負佛恩多矣校刻略注緣起命生不辰也殃及於親比及三年母以疾喪逮今耿耿食寢不忘談起痛心不覺涕漣也庚辰春師於崇壽開演華嚴行願法華普門最後彌陀余時首衆同門吼三兄期主旭如兄同學運微臨滄諸師姑蘇來同聽者擔雲悟塵師等咸謂言圓意妙旨遠宗深頓令心胸煥發耳目新奇然影響一時雖強勉記憶百分不及一耳衆倩余請重注師以首肯之始于二月念四終于三月十五注成閣筆囑余校刻余惟欲報母恩昊天罔及非淨土佛法蓮沼舟航不能薦生母于樂國也遂付諸板首印發流通普度恩有共證無生一遵釋迦報恩之訓一添彌陀接引之願此所以弘傳也敘述本末如是錢江映壁苾芻嚴光槃談
