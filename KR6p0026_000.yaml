front:
  text: 彌陀略注序即一念而成佛念依一佛而見諸佛非念佛之為理門其孰能勝於此舉一名而具萬德得一持而統百行非持名之為行道其孰能超於此在一方而覩六方受一説而領衆説非彌陀之為教典其孰能妙於此聞一言而入不退信一事而證菩提非釋迦之為果辨其孰能臻於此故我世尊自寂場以至雙林唯談一佛乘教始華嚴而終法華盛闡念佛法門王城對韋提希也是心是佛是心作佛諸佛身入生心時佛身即衆生之心相衆生心想佛身時生心即諸佛之身光祇園告舍利弗也持名以一心一意為趣往生以三慧三福為宗依報以行願德性為體正報以菩提功果為尊既以自性為彌陀還以唯心為淨土心穢惡也即苦娑婆心淨善也即樂安養心邪迷也即名衆生心正覺也即稱諸佛寶鈴教網覆七菩提之樹金剛戒繩間八正道之階種智蓮開于德水實相閣逈于性空法樂奏第一義天覺花雨實際理地六位鳥暢演五根三意生行供萬佛禪悅飫乎慧命忍衣披乎法身化道主光光相然十劫不離於當念補處聖生生不退果海還徹於因源七日一復于一心三輩九升于九品此心此理元同本佛他佛交讚當信是經義不可思議應知説法者希有甚難以是雲棲作疏鈔也體佛體經順機順理言言契乎本性法法歸乎自心心王為師心數為弟真諦即聲聞俗諦即菩薩始覺冥乎本覺是我佛讚彌陀本覺冥乎始覺是諸佛讚釋迦究竟覺滿名曰佛説經已周遍無住謂之作禮而去如是疏經隨所在以開明若此釋義悉有文而龜鑑廬山七祖以來弘揚淨土一門未有踰於斯作者也秉此教修無行不該依此理證無果不徹續法叨沐良深分燈酬報隨文摘録題名略注俾奕世弘傳塵方廣演從小學以究大學將後進而證先進念佛三昧者念佛念心淨業一行者淨性淨土已發願今發願願得不退心而入不退地若今生若當生生見無量壽而成無量光四色華馥于蓮池七樹果馨于𦦨網普化含靈齊遊樂國以此實語心首表而出之康熙庚辰年清和月佛降誕辰浙杭慈雲六十行人續法題于龍岡崇壽丈室
